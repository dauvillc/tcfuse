[workspace]
name = "tcfuse"
version = "0.1.0"
description = "A project to fuse geospatial data over tropical cyclones"
channels = ["conda-forge"]
platforms = ["linux-64"]

[system-requirements]
cuda = "12.0"

[dependencies]
python = "==3.12.11"
# Geospatial
xarray = "*"
zarr = "*"
cartopy = "*"
cmocean = "*"
h5py = "*"
netcdf4 = "*"
pandas = "*"
# Dev
jupyterlab = "*"
ipykernel = "*"
pytest = "*"
submitit = ">=1.5.4,<2"
hydra-core = ">=1.3.2,<2"
hydra-submitit-launcher = ">=1.2.0,<2"
pyresample = ">=1.35.0,<2"
boto3 = ">=1.42.91,<2"
dask = ">=2026.3.0,<2027"
polars = ">=1.40.0,<2"
scipy = ">=1.17.1,<2"
basedpyright = ">=1.39.4,<2"
pre-commit = ">=4.6.0,<5"

[pypi-dependencies]
tcfuse = { path = ".", editable = true }

# PyTorch from the official wheel index (CUDA 12.8 build)
torch = { version = "==2.8.0", index = "https://download.pytorch.org/whl/cu128" }
torchvision = { version = "*", index = "https://download.pytorch.org/whl/cu128" }
# ML utilities
wandb = "*"
einops = "*"
timm = "*"
ruff = ">=0.15.11, <0.16"
lightning = "==2.5.6"
[tasks]
notebook = "jupyter lab --no-browser"
test = "pytest tests/"
lint = "ruff check src/ tests/ scripts/"
format = "ruff format src/ tests/ scripts/"
format-check = "ruff format --check src/ tests/ scripts/"
typecheck = { cmd = "basedpyright", env = { LANG = "C", LC_ALL = "C" } }
export-jz-requirements = "python scripts/export_jz_requirements.py"
check-jz-requirements = "python scripts/export_jz_requirements.py --check"

# Preprocessing pipeline (local: paths=local setup=local submitit=false)
preprocess-ibtracs = "python scripts/preprocess/prepare_ibtracs.py paths=local setup=local"
preprocess-pmw = { cmd = "python scripts/preprocess/tc_primed/prepare_pmw.py paths=local setup=local submitit=false", depends-on = ["preprocess-ibtracs"] }
preprocess-infrared = { cmd = "python scripts/preprocess/tc_primed/prepare_infrared.py paths=local setup=local submitit=false", depends-on = ["preprocess-ibtracs"] }
preprocess-radar = { cmd = "python scripts/preprocess/tc_primed/prepare_radar.py paths=local setup=local submitit=false", depends-on = ["preprocess-ibtracs"] }
preprocess-sar = { cmd = "python scripts/preprocess/sar/prepare_sar.py paths=local setup=local submitit=false", depends-on = ["preprocess-ibtracs"] }
preprocess-assemble = "python scripts/preprocess/assemble.py paths=local setup=local submitit=false num_workers=4"
preprocess-splits = "python scripts/preprocess/build_splits.py paths=local setup=local"
preprocess-normalization = "python scripts/preprocess/compute_normalization.py paths=local setup=local submitit=false"

# Stage composites
preprocess-stage0 = { depends-on = ["preprocess-ibtracs"] }
preprocess-stage1 = { depends-on = ["preprocess-ibtracs", "preprocess-pmw", "preprocess-infrared", "preprocess-radar", "preprocess-sar"] }
preprocess-stage2 = { depends-on = ["preprocess-stage1", "preprocess-assemble"] }
preprocess-stage3 = { depends-on = ["preprocess-stage2", "preprocess-splits", "preprocess-normalization"] }
preprocess = { depends-on = ["preprocess-stage3"] }
