[workspace]
name = "tcfuse"
version = "0.1.0"
description = "A project to fuse geospatial data over tropical cyclones"
channels = ["conda-forge"]
platforms = ["linux-64"]

[system-requirements]
cuda = "12.0"

[dependencies]
python = "==3.12.11"
# Geospatial
xarray = "*"
zarr = "*"
cartopy = "*"
# Dev
jupyterlab = "*"
ipykernel = "*"
pytest = "*"

[pypi-dependencies]
# PyTorch from the official wheel index (CUDA 12.8 build)
torch = { version = "==2.8.0", index = "https://download.pytorch.org/whl/cu128" }
torchvision = { version = "*", index = "https://download.pytorch.org/whl/cu128" }
# ML utilities
wandb = "*"
einops = "*"
timm = "*"
ruff = ">=0.15.11, <0.16"

[tasks]
notebook = "jupyter lab --no-browser"
test = "pytest tests/"
lint = "ruff check src/ tests/ scripts/"
format = "ruff format src/ tests/ scripts/"
format-check = "ruff format --check src/ tests/ scripts/"
