repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: format (pixi run format)
        entry: pixi run format
        language: system
        pass_filenames: false
        types: [python]
      - id: ruff
        name: lint (pixi run lint-fix)
        entry: pixi run lint-fix
        language: system
        pass_filenames: false
        types: [python]
      - id: basedpyright
        name: typecheck (pixi run typecheck)
        entry: pixi run typecheck
        language: system
        pass_filenames: false
        types: [python]
