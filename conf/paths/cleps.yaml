# Base directories
# Code lives in $HOME/tcfuse (the rsync target — `rsynctf` syncs to cleps:),
# which is backed up but capped at 100 GB. Data and training outputs go to
# $SCRATCH (Lustre, persistent on CLEPS, 20 TB project quota).
work: ${oc.env:HOME}/tcfuse
scratch: ${oc.env:SCRATCH}/tcfuse
store: ${oc.env:SCRATCH}/tcfuse  # No STORE on CLEPS; scratch persists, so alias it.

# Paths to raw datasets
raw_datasets:
  ibtracs: ${paths.scratch}/data/raw/ibtracs/ibtracs.ALL.list.v04r01.csv
  tc_primed: ${paths.scratch}/data/raw/tc_primed
  cyclobs: ${paths.scratch}/data/raw/cyclobs
  dropsondes: ${paths.scratch}/data/raw/dropsondes
  argo: ${paths.scratch}/data/raw/argo

# Root directory for preprocessed sources.
# Each source is stored at ${paths.preprocessed_sources}/<source_name>/.
preprocessed_sources: ${paths.scratch}/data/preprocessed/sources

# Directory for preprocessed data after it has been assembled into a single
# dataset.
preprocessed_data: ${paths.scratch}/data/preprocessed/assembled/

# Paths for training outputs.
# Checkpoints live on scratch (not work): home is only 100 GB and checkpoints
# are large. Scratch is persistent on CLEPS, so this is safe.
checkpoints: ${paths.scratch}/checkpoints
wandb: ${paths.scratch}/wandb
figures: ${paths.work}/figures

# Root directory for prediction runs.
# Each run lives at ${paths.predictions}/<run_id>/ with manifest.yaml,
# index.parquet, ibtracs.parquet, and samples/<sample_id>.h5.
predictions: ${paths.scratch}/predictions

# Archive paths. On CLEPS scratch is persistent and the user makes their own
# backups, so archiving is disabled (archive: false in every cleps_* setup).
# These point at scratch only so the keys resolve; no archive job writes them.
archives:
  raw_tc_primed:        ${paths.scratch}/archives/raw/tc_primed.tar.gz
  raw_cyclobs:          ${paths.scratch}/archives/raw/cyclobs.tar.gz
  preprocessed_sources: ${paths.scratch}/archives/preprocessed/sources
  preprocessed_data:    ${paths.scratch}/archives/preprocessed/assembled.tar.gz
  checkpoints:          ${paths.scratch}/archives/checkpoints
  predictions:          ${paths.scratch}/archives/predictions
