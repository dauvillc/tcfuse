# Base directories
work: /home/cdauvill/inria/tcfuse
scratch: /home/cdauvill/scratch/tcfuse
store: /home/cdauvill/scratch/tcfuse  # There's no store on the local machine.

# Paths to raw datasets
raw_datasets:
  ibtracs: ${paths.scratch}/data/raw/ibtracs/ibtracs.ALL.list.v04r01.csv
  tc_primed: ${paths.scratch}/data/raw/tc_primed
  cyclobs: ${paths.scratch}/data/raw/cyclobs
  dropsondes: ${paths.scratch}/data/raw/dropsondes
  argo: ${paths.scratch}/data/raw/argo

# Root directory for preprocessed sources.
# Each source is stored at ${paths.preprocessed_sources}/<source_name>/.
preprocessed_sources: ${paths.scratch}/data/preprocessed/sources

# Directory for preprocessed data after it has been assembled into a single
# dataset.
preprocessed_data: ${paths.scratch}/data/preprocessed/assembled/

# Paths for training outputs
checkpoints: ${paths.work}/checkpoints
wandb: ${paths.scratch}  # W&B will itself create a "wandb" subdir here.
figures: /home/cdauvill/inria/tcfuse/figures  # project-wide figures (papers, exploration)

# Root directory for per-run validation diagnostics (figures); train.py keys it by run_id.
validation: ${paths.scratch}/validation

# Root directory for saved inference runs (one subdir per prediction run).
predictions: ${paths.scratch}/predictions

# Root directory for saved evaluation results; evaluate.py keys it by
# run_id/experiment_name (mirroring the predictions layout), one subdir per plugin.
results: ${paths.scratch}/results

# Archive paths (on local, store == scratch, and archive is disabled via setup config).
archives:
  raw_tc_primed:        ${paths.scratch}/archives/raw/tc_primed.tar.gz
  raw_cyclobs:          ${paths.scratch}/archives/raw/cyclobs.tar.gz
  preprocessed_sources: ${paths.scratch}/archives/preprocessed/sources
  preprocessed_data:    ${paths.scratch}/archives/preprocessed/assembled.tar.gz
  checkpoints:          ${paths.scratch}/archives/checkpoints
