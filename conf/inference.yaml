# Inference / evaluation entry point.
# Loads a training run's best checkpoint, runs it over a split, and writes a
# PredictionRun.
#
# Usage::
#
#     python scripts/inference/infer.py experiment=pmw_gmi \
#         run_id=0627015132 split=test
defaults:
  - dataloader: default
  - datamodule: default
  - optimizer: default        # unused at inference, but the module __init__ requires it
  - lr_scheduler: default     # likewise carried only to satisfy the constructor
  - windows_setup: ???        # provided by the experiment
  - setup: local              # setup configs own paths; unused (no submitit here), kept so experiments resolve
  - lightning_module: ???     # provided by the experiment; mounts its model. The model
                              # architecture is taken from the checkpoint's embedded config
                              # (hydra_cfg) at inference, so this no longer has to match the
                              # trained weights — it is only a fallback for checkpoints that
                              # predate config embedding.
  - _self_
  - experiment: ???           # must be specified at launch (defines name + sources)

# Training run id whose best checkpoint is loaded (required). This is the
# directory name under paths.checkpoints assigned by scripts/train/train.py;
# inference resolves its best-*.ckpt automatically.
run_id: ???

# Which split to run inference over: "train", "val", or "test".
split: test

# Optional cap on the number of windows to process (null = all). For smoke tests.
limit_samples: null

# Compute and save per-source/per-channel metrics (metrics.csv) after writing.
compute_metrics: true
