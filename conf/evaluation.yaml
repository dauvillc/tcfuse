# Evaluation entry point — compare models from their saved PredictionRuns.
#
# Locates the predictions written by scripts/inference/infer.py for every model
# declared in `models` (each a (run_id, experiment_name) pair), opens them, and
# dispatches the whole mapping to a set of evaluation plugins. Each enabled
# plugin compares the models and writes into its own subfolder under
# paths.results/<eval_name>/.
#
# The model set is supplied by a required `comparison` config (conf/comparison/),
# which fills the top-level `eval_name` and `models` keys. Pick one on the CLI:
#
#     python scripts/evaluation/evaluate.py comparison=debug
#
# Add a new comparison by dropping a file in conf/comparison/ (see debug.yaml).
defaults:
  - setup: local            # setup configs own paths (setup=local -> paths=local)
  - comparison: ???         # required: selects the model set (eval_name + models)
  - evaluation/quantitative_metrics   # default-enabled plugin (config group below)
  - _self_

# `eval_name` and `models` are provided by the selected `comparison` config above
# (packaged at _global_). See conf/comparison/debug.yaml for the expected shape:
#   eval_name: <names the results dir under paths.results/<eval_name>/>
#   models:    {model_name: {run_id, experiment_name}}  # order = column/plot order
