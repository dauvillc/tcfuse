# Main configuration file for data preprocessing.
defaults:
  - paths: jz    # override with paths=jz on Jean-Zay
  - setup: jz_cpu    # override with setup=jz_<hw> on Jean-Zay
  - _self_

# If true, launches the jobs as a SLURM job using submitit
submitit: true

# Number of parallel preprocessing workers (override on Jean-Zay via setup config).
num_workers: 4

# Approximate number of snapshots per submitit job chunk.
chunk_size: 200

# Which seasons to use for val/test splits. All other seasons are used for training.
splits:
  val: [2019, 2021]
  test: [2020, 2022, 2023]

# Best-track window samples built by scripts/preprocess/build_splits.py.
window_index:
  source_name: ibtracs_best_track
  leads_hours: [0, 6, 12, 18, 24, 30]
  required_leads_hours: [0, 6, 30]
  required_channels: [usa_vmax_kt]
  required_meta: [lat, lon]
