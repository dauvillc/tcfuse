# Main configuration file for training.
defaults:
  - dataloader: default
  - datamodule: default
  - lightning_module: ???   # must be specified by experiment; the lightning_module config imports its model via defaults
  - trainer: default
  - optimizer: default
  - lr_scheduler: default
  - logger: wandb
  - windows_setup: ???      # must be specified by experiment
  - setup: local            # setup configs own paths; override with setup=jz_<hw> on Jean-Zay
  - _self_
  - experiment: ???         # must be specified at launch; can override submitit and other base values

submitit: true  # Set to false to run locally

# Logical-run identifier: groups all W&B segments and keys the checkpoint dir.
# Leave null to derive it from the launch timestamp (one fresh run). To resume an
# interrupted run by hand, pass run_id=<existing id> so training picks up that
# run's last.ckpt and logs into the same W&B group.
run_id: null
