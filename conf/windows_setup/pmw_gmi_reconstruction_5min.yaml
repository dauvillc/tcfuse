# Window configuration: PMW GMI reconstruction from near-concurrent PMW passes.
# Each pmw_gmi_gpm snapshot anchors a window. Any PMW pass from another sensor
# within ±5min provides context; the GMI snapshot itself is the masked target.
name: pmw_gmi_reconstruction_5min

target_sources:
  - pmw_gmi_gpm

# The "pmw" prefix matches all PMW sensors (amsr2, amsre, ssmi, ssmis, tmi,
# and gmi itself). Windows with fewer than 2 matching PMW passes are discarded:
# since the target GMI snapshot itself counts as one match, this guarantees at
# least one non-target context image per sample.
input_sources:
  pmw:
    - ["-5m", "+5m", 2]   # target + at least one other PMW pass within ±5min required
