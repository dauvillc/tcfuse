# @package _global_
# Debug comparison: a tiny two-model set for exercising the evaluation pipeline.
#
# `comparison` is a required default in conf/evaluation.yaml, so select it with:
#
#     python scripts/evaluation/evaluate.py comparison=debug
#
# Packaged under _global_ so it fills the top-level `eval_name` / `models` keys
# required by conf/evaluation.yaml.

# Names the results directory under paths.results/<eval_name>/.
eval_name: debug-eval

# The two prediction sets to compare. run_id values are quoted so their leading
# zeros survive (YAML would otherwise read them as integers).
models:
  two_layers: { run_id: "0702144712", experiment_name: pmw-gmi-5min }
