# pl.Trainer kwargs — all overridable per experiment.
# devices and num_nodes default to 1 for local runs; JZ setup configs override
# them at the global level (e.g. setup=jz_4xh100 sets trainer.devices=4).
# Training is iteration-based: max_steps governs when training stops.
max_steps: ???                # required; total optimizer steps, set in experiment config
max_epochs: -1                # disable the epoch limit so max_steps alone stops training
precision: auto               # auto -> bf16-mixed if the GPU supports bf16, else 16-mixed;
                              # override with an explicit value (e.g. 32-true) per experiment
log_every_n_steps: 50         # also controls StepProgressCallback print cadence
# Validation cadence is step-based: run every val_check_interval global steps,
# regardless of epoch boundaries (check_val_every_n_epoch=null detaches val from epochs).
val_check_interval: 500
check_val_every_n_epoch: null
strategy: ddp                 # single-GPU experiments can override to auto
devices: 1
num_nodes: 1
accelerator: gpu              # override to cpu for CPU-only runs
# Note: enable_progress_bar is forced to False in train.py — tqdm silently
# disables itself in SLURM log files (no TTY); use StepProgressCallback instead.

# ModelCheckpoint kwarg — not forwarded to Trainer, consumed by train.py
checkpoint_every_n_steps: 500

# EarlyStopping kwarg — not forwarded to Trainer, consumed by train.py.
# Stop training after val/loss fails to improve for this many global steps.
# Set to null (or <= 0) to disable early stopping.
early_stopping_patience_steps: 25000
