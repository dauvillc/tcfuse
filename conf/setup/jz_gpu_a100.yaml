# @package _global_
# Jean-Zay A100 octo-GPU partition (gpu_p5).
# Hardware: 8x A100 SXM4 80 GB, 64 CPUs (AMD Milan EPYC 7543), ~468 GB RAM.
# Max walltime: 20h (no t4 QoS on A100).
# NOTE: AMD architecture requires module load arch/a100 BEFORE pytorch module.
# Slurm constraint -C a100 is mandatory to target this partition.

defaults:
  - override /paths: jz

setup:
  slurm_partition: gpu_p5
  slurm_account: xyw@a100
  slurm_constraint: a100          # -C a100 is mandatory for this partition
  nodes: 1
  tasks_per_node: 1
  gpus_per_node: 8
  cpus_per_task: 64
  mem_gb: 468
  timeout_min: 1200               # hard max 20h on A100 (no qos_gpu_a100-t4 exists)
  signal_delay_s: 120
  slurm_setup:
    - "module load arch/a100"     # must load BEFORE pytorch — AMD Milan architecture
    - "module load pytorch-gpu/py3/2.8.0"
  num_workers: 7                  # per GPU (64 CPUs / 8 GPUs, leaving slack)
  name: tc_fusion_jz_a100
archive: true
