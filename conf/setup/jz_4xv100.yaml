# @package _global_
# Jean-Zay V100 full-node setup — 4× V100, gpu_p13 partition (default GPU partition).
# Hardware: 4x V100 (16 or 32 GB), 40 CPUs (Intel), ~160 GB RAM.
# QoS: qos_gpu-t3 (default, max 20h) or qos_gpu-t4 (max 100h, <=16 GPU/job).
# To target 32 GB V100 only, add: setup.slurm_constraint=v100-32g
# For a single-GPU smoke test, use setup=jz_v100 instead.

defaults:
  - override /paths: jz

setup:
  timeout_min: 1200               # 20h (qos_gpu-t3 default); set 6000 for qos_gpu-t4
  slurm_nodes: 1
  cpus_per_task: 10
  slurm_ntasks_per_node: ${trainer.devices}
  slurm_gres: "gpu:4"
  slurm_account: "xyw@v100"
  slurm_signal_delay_s: 120
  slurm_additional_parameters:
    hint: nomultithread
  slurm_setup:
    - "source ${oc.env:HOME}/.bash_profile"
    - "v100"
  name: tc_fusion_jz_v100

trainer:
  devices: 4
  num_nodes: 1

dataloader:
  num_workers: 8                  # per GPU (40 CPUs / 4 GPUs, leaving slack)

archive: true
