# @package _global_
defaults:
  - override /paths: jz

setup:
  timeout_min: 240
  cpus_per_task: 40
  slurm_ntasks_per_node: 1
  name: ${eval_name}
  slurm_account: "xyw@cpu"
  slurm_signal_delay_s: 120
  slurm_additional_parameters:
    hint: nomultithread
  setup_commands:
    - "module load pytorch-gpu/py3/2.8.0"
  
num_workers: 39
archive: true