# @package _global_
# Jean-Zay V100 single-GPU setup — gpu_p13 partition (default GPU partition).
# Hardware: 1x V100 (16 or 32 GB), 10 CPUs (Intel).
# QoS: qos_gpu-t3 (default, max 20h) or qos_gpu-t4 (max 100h, <=16 GPU/job).
# To target 32 GB V100 only, add: setup.slurm_constraint=v100-32g
# For a full-node 4-GPU training run, use setup=jz_4xv100 instead.

defaults:
  - /paths: jz

setup:
  timeout_min: 1200               # 20h (qos_gpu-t3 default); set 6000 for qos_gpu-t4
  slurm_nodes: 1
  cpus_per_task: 10
  slurm_ntasks_per_node: ${trainer.devices}
  slurm_gres: "gpu:1"
  slurm_account: "xyw@v100"
  slurm_signal_delay_s: 120
  slurm_additional_parameters:
    hint: nomultithread
  slurm_setup:
    - "source ${oc.env:HOME}/.bash_profile"
    - "v100"
  name: tc_fusion_jz_v100

trainer:
  devices: 1
  num_nodes: 1

dataloader:
  num_workers: 8                  # 10 CPUs allocated, leaving slack for the main process

archive: true
