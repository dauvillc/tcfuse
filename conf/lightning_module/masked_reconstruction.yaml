defaults:
  - /model@model: transformer   # mounts conf/model/<name>.yaml at the `model` key; override with "- override /model@model: <name>"

_target_: tcfuse.lightning.masked_reconstruction.MaskedReconstructionLightningModule
adamw_kwargs: ${optimizer}
lr_scheduler_kwargs: ${lr_scheduler}
validation_dir: ${paths.validation}   # base dir; train.py appends the run_id (-> ${paths.validation}/<run_id>) so runs don't overwrite each other
num_val_figure_samples: 4   # validation samples to render Target|Pred|Error figures for each epoch (rank 0)
# sources_metadata and normalization_stats are injected at instantiation time from train.py
