# @package _global_
# Dummy experiment: reconstruct GMI from concurrent PMW passes.
# Lightweight smoke test for local runs and JZ sanity checks.
# Submit to JZ: add submitit=true setup=jz_v100 paths=jz on the CLI.
defaults:
  - override /lightning_module: masked_reconstruction
  - override /windows_setup: pmw_gmi_reconstruction

# Short name used to build the W&B run's display name (see BaseLightningModule.on_train_start).
name: pmw-gmi-dummy

trainer:
  max_steps: 20              # tiny step budget for the smoke test
  val_check_interval: 10     # validate every 10 global steps
  accelerator: gpu
  strategy: auto
  devices: 1

dataloader:
  batch_size: 2
  num_workers: 0
  pin_memory: false
  persistent_workers: false

# Tiny model so the sanity-check val loop fits on a 16 GB V100.
# The model lives at lightning_module.model (mounted there by masked_reconstruction.yaml).
lightning_module:
  model:
    patch_size: 16
    embed_dim: 64
    num_layers: 2
    num_heads: 4

submitit: false
