# @package _global_
# Dummy experiment: reconstruct GMI from concurrent PMW passes.
# local smoke-testing.
defaults:
  - override /lightning_module: masked_reconstruction
  - override /windows_setup: pmw_gmi_reconstruction

# Short name used to build the W&B run's display name (see BaseLightningModule.on_train_start).
name: pmw-gmi-dummy

trainer:
  max_epochs: 2
  accelerator: gpu
  strategy: auto
  devices: 1

dataloader:
  batch_size: 4
  num_workers: 0
  pin_memory: false
  persistent_workers: false

submitit: false
