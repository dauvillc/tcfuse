name: Type Check

on:
  pull_request:
  push:

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and type checker
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . -r requirements-dev.txt -r requirements-ci.txt

      - name: Run typecheck (basedpyright)
        run: basedpyright
