name: Type Check

on:
  pull_request:
  push:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    env:
      # Mock __cuda so Pixi can install the CUDA-targeted lockfile on CPU-only runners.
      CONDA_OVERRIDE_CUDA: "12.0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.8.10
        with:
          pixi-version: latest
          cache: true

      - name: Run typecheck (basedpyright)
        run: pixi run typecheck
